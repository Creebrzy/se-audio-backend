services:
  - type: web
    name: se-audio-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # $7/mo — sufficient for this workload
    region: oregon
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://soundengine3.pages.dev
      - key: MAX_DURATION_SECONDS
        value: "600"
    healthCheckPath: /health
    autoDeploy: true
